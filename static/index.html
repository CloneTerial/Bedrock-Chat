<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover"
    />
    <title>Bedrock Chat</title>
    <link rel="manifest" href="/static/manifest.json" />
    <meta name="theme-color" content="#08080E" />
    <link rel="stylesheet" href="/static/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"
    />
  </head>
  <body>
    <div class="app">
      <!-- ── Sidebar ─────────────────────────────────────────── -->
      <aside class="sidebar" id="sidebar">
        <div class="sb-hd">
          <span class="logo">Bedrock Chat</span>
          <div style="display: flex; gap: 2px">
            <button
              class="ib"
              onclick="toggleTheme()"
              title="Toggle theme"
              id="themeBtn"
            >
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <circle cx="12" cy="12" r="5" />
                <path
                  d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"
                />
              </svg>
            </button>
            <button class="ib" onclick="newChat()" title="New chat (Ctrl+N)">
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
              >
                <path d="M12 5v14M5 12h14" />
              </svg>
            </button>
            <button
              class="ib sb-close-btn"
              onclick="toggleSidebar()"
              title="Close sidebar"
            >
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <line x1="18" y1="6" x2="6" y2="18" />
                <line x1="6" y1="6" x2="18" y2="18" />
              </svg>
            </button>
          </div>
        </div>

        <div class="sb-search">
          <input
            type="text"
            id="chatSearch"
            placeholder="Search chats…"
            oninput="filterChats(this.value)"
          />
        </div>

        <div class="cl" id="chatList"></div>

        <div class="sb-ft">
          <div class="sb-cost" id="totalCost">Session: $0.000000</div>
          <button
            class="sb-set"
            onclick="exportChat()"
            title="Export conversation"
          >
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="7 10 12 15 17 10" />
              <line x1="12" y1="15" x2="12" y2="3" />
            </svg>
            Export
          </button>
          <button class="sb-set" onclick="openSettings()">
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="3" />
              <path
                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
              />
            </svg>
            Settings
          </button>
        </div>
      </aside>

      <!-- ── Main ────────────────────────────────────────────── -->
      <main class="main">
        <header class="hdr">
          <button
            class="ib hdr-menu"
            onclick="toggleSidebar()"
            title="Toggle sidebar"
          >
            <svg
              width="17"
              height="17"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M3 6h18M3 12h18M3 18h18" />
            </svg>
          </button>

          <select
            class="msel"
            id="modelSel"
            onchange="onModelChange()"
          ></select>

          <div class="tki" id="tokInfo" title="Token usage this request">
            <span title="Input tokens">
              <svg
                width="10"
                height="10"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
              >
                <path d="M12 19V5M5 12l7-7 7 7" />
              </svg>
              0
            </span>
            <span title="Output tokens">
              <svg
                width="10"
                height="10"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
              >
                <path d="M12 5v14M19 12l-7 7-7-7" />
              </svg>
              0
            </span>
            <span title="Cost">$0.000000</span>
          </div>
        </header>

        <div class="mw" id="msgsWrap">
          <div class="msgs" id="msgs">
            <div class="welcome" id="welcome">
              <div class="w-icon">⚡</div>
              <h1>Bedrock AI Chat</h1>
              <p>Claude-like experience — powered by AWS Bedrock</p>
              <div class="hints">
                <button onclick="useHint(this)">
                  Explain quantum computing simply
                </button>
                <button onclick="useHint(this)">
                  Write a Python web scraper
                </button>
                <button onclick="useHint(this)">Help me debug my code</button>
                <button onclick="useHint(this)">
                  Create a business plan outline
                </button>
              </div>
            </div>
          </div>
        </div>

        <div class="iw" id="inputWrapper">
          <div id="fileChips" class="file-chips"></div>
          <div class="ib-box">
            <input
              type="file"
              id="fileIn"
              multiple
              style="display: none"
              onchange="onFileChange()"
            />
            <button
              class="ib-att"
              onclick="document.getElementById('fileIn').click()"
              title="Attach files"
            >
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"
                />
              </svg>
            </button>
            <textarea
              id="msgIn"
              rows="1"
              placeholder="Message Bedrock…"
              onkeydown="onKey(event)"
              oninput="autoGrow(this)"
            ></textarea>
            <button
              class="sendbtn"
              id="sendBtn"
              onclick="onSendClick()"
              title="Send message"
            >
              <svg
                id="icSend"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="currentColor"
              >
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
              </svg>
              <svg
                id="icStop"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="currentColor"
                style="display: none"
              >
                <rect x="6" y="6" width="12" height="12" rx="2" />
              </svg>
            </button>
          </div>
          <div class="ifoot">
            <label class="ttog" title="Enable/disable tool use">
              <input type="checkbox" id="toolsTog" checked />
              <svg
                width="12"
                height="12"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"
                />
              </svg>
              Tools
            </label>
            <span
              id="modelLbl"
              style="font-size: 11px; color: var(--tx2)"
            ></span>
          </div>
        </div>
      </main>

      <!-- ── Artifacts Panel ─────────────────────────────────── -->
      <aside class="art-panel" id="artPanel">
        <div class="art-hd">
          <div class="art-t">
            <span id="artTitle">Artifact</span>
            <span id="artLang" class="art-l">html</span>
          </div>
          <button class="ib" onclick="toggleArt()" title="Close panel">
            <svg
              width="15"
              height="15"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>
        <div class="art-bd">
          <iframe id="artFrame" sandbox="allow-scripts"></iframe>
        </div>
      </aside>
    </div>
    <!-- /.app -->

    <!-- ── Settings Modal ───────────────────────────────────── -->
    <div class="mbg" id="setModal" onclick="bgClose(event)">
      <div class="modal">
        <div class="mhd">
          <h2>Settings</h2>
          <button class="ib" onclick="closeSettings()" title="Close">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>
        <div class="mbd">
          <div>
            <label>System Prompt</label>
            <textarea
              id="sysP"
              rows="8"
              placeholder="Enter system prompt…"
            ></textarea>
          </div>
          <div>
            <label>Default Model</label>
            <select id="defMod"></select>
          </div>
          <div class="mrow">
            <div>
              <label>Temperature: <span id="tVal">0.7</span></label>
              <input
                type="range"
                id="tSlider"
                min="0"
                max="1"
                step="0.1"
                value="0.7"
                oninput="
                  document.getElementById('tVal').textContent = this.value
                "
              />
            </div>
            <div>
              <label>Max Tokens</label>
              <input
                type="number"
                id="mTok"
                value="4096"
                min="100"
                max="16384"
                step="256"
              />
            </div>
          </div>
          <label class="cb">
            <input type="checkbox" id="tDef" checked />
            Enable tools by default
          </label>
        </div>
        <div class="mft">
          <button class="b2" onclick="resetSettings()">Reset</button>
          <button class="b1" onclick="saveSettings()">Save Settings</button>
        </div>
      </div>
    </div>

    <!-- Image Preview Modal -->
    <div class="img-modal" id="imgModal" onclick="closeImgModal()">
      <span class="img-close">&times;</span>
      <img id="imgModalContent" src="" alt="Preview" />
    </div>

    <!-- Mobile Sidebar Overlay -->
    <div
      class="sidebar-overlay"
      id="sidebarOverlay"
      onclick="toggleSidebar()"
    ></div>

    <!-- Keyboard Shortcuts Toast -->
    <div class="shortcuts-toast" id="shortcutsToast">
      <strong>Shortcuts:</strong> Ctrl+N New · Ctrl+Enter Send · Ctrl+/ Sidebar
      · Esc Close
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
